<!DOCTYPE html>
<html>
<head>
    <title>Results</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>📈 Analysis Result</h2>

    <div class="card">
        <h3>Placement Status</h3>
        <p id="placement"></p>
    </div>

    <div class="card">
        <h3>Probability</h3>
        <p id="probability"></p>
    </div>

    <div class="card">
        <h3>Academic Risk</h3>
        <p id="risk"></p>
    </div>

    <div class="card">
        <h3>Skill Gaps</h3>
        <p id="gaps"></p>
    </div>

    <h3>📊 Placement Probability Graph</h3>
    <canvas id="probChart"></canvas>

    <h3>🥧 Skill Gap Chart</h3>
    <canvas id="gapChart"></canvas>

    <h3>🤖 AI Suggestions</h3>
    <div class="card">
        <p id="aiSuggestions"></p>
    </div>

    <button onclick="goBack()">Analyze Again</button>

</div>

<script src="script.js"></script>

</body>
</html>
